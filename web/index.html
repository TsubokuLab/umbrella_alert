<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>場所設定 - おでかけ傘アラート</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">☂️</text></svg>'>
<!-- Leaflet (地図) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root{ --primary-start:#667eea; --primary-end:#764ba2; }
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    margin:0;padding:16px;
    background:linear-gradient(135deg,var(--primary-start),var(--primary-end));
    min-height:100vh;color:#1f2937;
  }
  .container{
    max-width:480px;margin:0 auto;
    background:rgba(255,255,255,0.97);border-radius:20px;
    padding:24px;box-shadow:0 25px 50px rgba(0,0,0,0.25);
  }
  h1{font-size:22px;text-align:center;margin:0 0 4px;color:#2d3748;}
  .sub{text-align:center;color:#6b7280;font-size:13px;margin-bottom:16px;}
  .device{
    display:flex;align-items:center;gap:6px;
    font-size:12px;background:rgba(102,126,234,0.08);
    border:1px solid rgba(102,126,234,0.2);border-radius:8px;
    padding:4px 8px;margin-bottom:12px;color:#1e40af;white-space:nowrap;
  }
  .device .label{flex:none;}
  .device .val{
    flex:1;min-width:0;font-size:13px;color:#1e3a8a;font-weight:600;
    overflow:hidden;text-overflow:ellipsis;
  }
  .howto{
    background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;
    padding:8px 14px;margin-bottom:16px;font-size:14px;color:#374151;
  }
  .howto summary{cursor:pointer;font-weight:700;color:#4338ca;padding:4px 0;}
  .howto ol{margin:8px 0;padding-left:20px;line-height:1.7;}
  .howto-note{font-size:12px;color:#6b7280;margin-top:6px;}
  .map-wrap{position:relative;margin-bottom:12px;}
  #map{height:300px;border-radius:14px;border:1px solid #e5e7eb;}
  /* 中央のレティクル（常に地図中心＝選択地点） */
  .reticle{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    pointer-events:none;z-index:1000;
  }
  label{display:block;font-weight:600;font-size:14px;margin:10px 0 6px;color:#374151;}
  input[type=text]{
    width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:12px;
    font-size:16px;transition:border-color .2s;
  }
  input[type=text]:focus{outline:none;border-color:var(--primary-start);}
  /* 地図直下の1行: 小さい現在地ボタン（左） + 緯度経度（右） */
  .actionrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 2px 8px 0;}
  .btn-sm{
    flex:none;padding:8px 12px;border-radius:10px;border:2px solid var(--primary-start);
    background:#fff;color:var(--primary-end);font-size:13px;font-weight:700;
    cursor:pointer;white-space:nowrap;
  }
  .btn-sm:active{transform:translateY(1px);}
  .coordline{
    flex:1;text-align:right;font-size:12px;color:#6b7280;
    word-break:break-all;font-variant-numeric:tabular-nums;
  }
  .btn{
    width:100%;padding:16px;border:none;border-radius:12px;
    font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;
    color:#fff;background:linear-gradient(135deg,var(--primary-start),var(--primary-end));
    transition:transform .15s,box-shadow .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn.secondary{background:#fff;color:var(--primary-end);border:2px solid var(--primary-start);}
  .status{margin-top:14px;padding:12px;border-radius:10px;font-size:14px;display:none;}
  .status.show{display:block;}
  .status.ok{background:rgba(34,197,94,.12);color:#166534;border:1px solid rgba(34,197,94,.3);}
  .status.warn{background:rgba(245,158,11,.12);color:#92400e;border:1px solid rgba(245,158,11,.3);}
  .status.err{background:rgba(239,68,68,.12);color:#991b1b;border:1px solid rgba(239,68,68,.3);}
  .manual{margin-top:10px;font-size:12px;color:#6b7280;word-break:break-all;}
  .manual a{color:var(--primary-end);}
  .footer{text-align:center;margin-top:20px;font-size:12px;color:#9ca3af;}
</style>
</head>
<body>
<div class="container">
  <div class="device" id="deviceInfo">本体IPを確認中…</div>

  <h1>☂️ 場所の設定</h1>
  <div class="sub">地図を動かして、知りたい場所を中央の照準に合わせてください</div>

  <!--
    「はじめての設定」案内は、このページに来る時点でWiFi接続済みが前提のため不要になり一旦コメントアウト。
    必要になったら復活させる。
  <details class="howto">
    <summary>はじめての設定（WiFi登録がまだの方）</summary>
    <ol>
      <li>スマホのWi-Fi設定で <b>Umbrella-Alert</b>（パスワード <b>12345678</b>）に接続</li>
      <li>自動で開く設定画面で、ご自宅のWi-Fiを登録 → 本体が再起動します</li>
      <li>スマホを<b>自宅のWi-Fi</b>に戻し、<b>このページを開き直して</b>下の地図で場所を設定</li>
    </ol>
    <div class="howto-note">※ 本体名は機器ごとに異なります（例 <b>umbrella-alert-a1b2.local</b>）。本体の完了/状態ページや画面に表示される名前を上の欄に入れてください。複数台ある場合は対象の名前/IPを指定します。</div>
  </details>
  -->

  <div class="map-wrap">
    <div id="map"></div>
    <div class="reticle" aria-hidden="true">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="12" fill="none" stroke="#764ba2" stroke-width="3"/>
        <circle cx="22" cy="22" r="12" fill="none" stroke="#ffffff" stroke-width="1"/>
        <line x1="22" y1="2"  x2="22" y2="14" stroke="#764ba2" stroke-width="3"/>
        <line x1="22" y1="30" x2="22" y2="42" stroke="#764ba2" stroke-width="3"/>
        <line x1="2"  y1="22" x2="14" y2="22" stroke="#764ba2" stroke-width="3"/>
        <line x1="30" y1="22" x2="42" y2="22" stroke="#764ba2" stroke-width="3"/>
        <circle cx="22" cy="22" r="2.5" fill="#764ba2"/>
      </svg>
    </div>
  </div>
  <div class="actionrow">
    <button class="btn-sm" id="gpsBtn">📍 現在地へ移動</button>
    <div class="coordline" id="coordVal">—</div>
  </div>

  <label for="name">地名（表示名）</label>
  <input type="text" id="name" placeholder="例: 自宅 / 渋谷">

  <button class="btn" id="sendBtn">✅ 本体に設定を保存</button>

  <div class="status" id="status"></div>
  <div class="manual" id="manual"></div>

  <div class="footer">© 2026 <a href="https://x.com/kohack_v" target="_blank">@kohack_v</a>. All rights reserved.</div>
</div>

<script>
(function(){
  "use strict";

  // ---- 状態（地図中心が常に選択地点） ----
  let lat = 35.681236, lon = 139.767125;   // 既定: 東京駅付近
  let geoTimer = null;                      // 逆ジオコーディングのデバウンス用
  const tzOffsetSec = -new Date().getTimezoneOffset() * 60; // 端末TZ(秒)を既定で送る

  const $ = (id) => document.getElementById(id);
  const nameInput = $("name"), coordVal = $("coordVal");
  const statusEl = $("status"), manualEl = $("manual");

  // 地名をユーザーが手編集したら自動補完で上書きしない
  nameInput.addEventListener("input", () => { nameInput.dataset.userEdited = "1"; });

  // ---- 送信先（?ip= 未指定なら mDNS の umbrella-alert.local を既定に）----
  // 常に編集可能な欄にして、mDNSが効かない端末では本体IPに変更できるようにする。
  const params = new URLSearchParams(location.search);
  let deviceIp = (params.get("ip") || "umbrella-alert.local").trim();
  (function renderDeviceInfo(){
    $("deviceInfo").innerHTML =
      "<span class='label'>送信先デバイス:</span><span class='val'>" + deviceIp + "</span>";
  })();

  // ---- 地図（中心がレティクル＝選択地点） ----
  const map = L.map("map").setView([lat, lon], 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19, attribution: "© OpenStreetMap contributors"
  }).addTo(map);

  function fmt(n){ return n.toFixed(6); }
  function updateCoordsDisplay(){ coordVal.textContent = fmt(lat) + ", " + fmt(lon); }

  // 地図移動中: 座標をライブ更新（軽い処理のみ）
  map.on("move", () => {
    const c = map.getCenter(); lat = c.lat; lon = c.lng;
    updateCoordsDisplay();
  });
  // 移動完了: 地名を逆ジオコーディングで取得（負荷を抑えるためここだけ）
  map.on("moveend", () => {
    const c = map.getCenter(); lat = c.lat; lon = c.lng;
    updateCoordsDisplay();
    reverseGeocode(lat, lon);
  });

  // 初期表示
  updateCoordsDisplay();
  reverseGeocode(lat, lon);

  // ---- 現在地へ移動（GPS） ----
  $("gpsBtn").addEventListener("click", () => {
    if (!navigator.geolocation) { showStatus("err", "この端末は位置情報に対応していません"); return; }
    showStatus("warn", "現在地を取得中…（許可を求められたら許可してください）");
    navigator.geolocation.getCurrentPosition(
      pos => {
        map.flyTo([pos.coords.latitude, pos.coords.longitude], 15);
        showStatus("ok", "現在地へ移動しました。照準を微調整できます。");
      },
      err => { showStatus("err", "現在地の取得に失敗: " + err.message); },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });

  // ---- 逆ジオコーディングで地名を自動入力（best-effort, Nominatim） ----
  // ユーザーが手編集していない場合のみ入力欄を更新する。
  function reverseGeocode(la, lo){
    if (nameInput.dataset.userEdited === "1") return;
    clearTimeout(geoTimer);
    geoTimer = setTimeout(async () => {
      try {
        const url = "https://nominatim.openstreetmap.org/reverse?format=json&zoom=14&accept-language=ja"
                  + "&lat=" + la + "&lon=" + lo;
        const r = await fetch(url, { headers: { "Accept": "application/json" } });
        const d = await r.json();
        const a = d.address || {};
        const n = a.city || a.town || a.village || a.suburb || a.county || d.name || "";
        if (nameInput.dataset.userEdited !== "1") nameInput.value = n;
      } catch (e) { /* 失敗しても手入力でOK */ }
    }, 600);
  }

  // ---- 送信（地名は未入力＝空でも可） ----
  function buildSaveUrl(){
    const q = new URLSearchParams({
      lat: fmt(lat), lon: fmt(lon),
      name: nameInput.value || "",
      tz: String(tzOffsetSec),
      _: String(Date.now())   // キャッシュ回避（毎回ユニークなURLにする）
    });
    return "http://" + deviceIp + "/save?" + q.toString();
  }

  $("sendBtn").addEventListener("click", () => {
    if (!deviceIp) { showStatus("err", "本体IPが未指定です"); return; }
    const url = buildSaveUrl();
    // HTTPSページからの fetch/img 等の背景送信は Mixed Content でブロックされる。
    // このページは遷移させず、別タブで本体の /save を開く（トップレベル遷移は許可される）。
    // 本体の確認ページは自動で閉じるため、別タブは一瞬表示されてすぐ閉じる。
    const w = window.open(url, "_blank");
    if (!w) {  // ポップアップがブロックされた場合は現在タブで遷移にフォールバック
      window.location.href = url;
      return;
    }
    showStatus("ok", "本体へ送信しました。本体が再起動して反映します（数十秒）。");
  });

  function showStatus(type, msg){
    statusEl.className = "status show " + type;
    statusEl.textContent = msg;
  }
})();
</script>
</body>
</html>
